name: Docker Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  docker:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: eduflow
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: |
          docker build -t eduflow:test .

      - name: Verify image starts
        run: |
          docker run --rm -d \
            --name eduflow_test \
            --network host \
            -e POSTGRES_DSN=postgresql://postgres:postgres@localhost:5432/eduflow \
            -e LLM_PROVIDER=openai \
            -e OPENAI_API_KEY=test-key \
            -e LOG_LEVEL=INFO \
            -e LOG_FORMAT=json \
            -e RATE_LIMIT_PER_MINUTE=100 \
            -e WAPPI_WEBHOOK_SECRET=test-secret \
            eduflow:test

          echo "Waiting for app to start..."
          sleep 10

          max_attempts=20
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            if curl -sf http://localhost:8000/health; then
              echo ""
              echo "Health check passed!"
              break
            fi
            echo "Attempt $attempt/$max_attempts..."
            sleep 3
            attempt=$((attempt+1))
          done

          if [ $attempt -gt $max_attempts ]; then
            echo "App failed to start"
            docker logs eduflow_test
            exit 1
          fi

      - name: Test health endpoint
        run: |
          curl -sf http://localhost:8000/health | python3 -m json.tool

      - name: Collect logs on failure
        if: failure()
        run: |
          docker logs eduflow_test || true

      - name: Cleanup
        if: always()
        run: |
          docker stop eduflow_test || true
