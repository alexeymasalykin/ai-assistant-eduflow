name: Docker Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: |
          docker build -t eduflow:test .

      - name: Verify image metadata
        run: |
          docker inspect eduflow:test --format='{{.Config.User}}' | grep -q appuser
          echo "Non-root user: OK"
          docker inspect eduflow:test --format='{{.Config.ExposedPorts}}' | grep -q 8000
          echo "Port 8000 exposed: OK"
          docker inspect eduflow:test --format='{{.Config.Healthcheck}}'
          echo "Healthcheck configured: OK"
